<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>linksblue chrome-capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1>linksblue chrome-capture</h1>
    <p class="subtitle">Pass 1 — observe and log only</p>
  </header>

  <section class="status">
    <div id="status-row" class="status-row">checking&hellip;</div>
    <div id="count-row" class="count-row">0 captures buffered (cap 200)</div>
  </section>

  <section class="actions">
    <button id="copy-all" type="button">Copy all to clipboard</button>
    <button id="clear" type="button">Clear</button>
    <button id="open-options" type="button">Open options</button>
    <span id="action-feedback" class="action-feedback" aria-live="polite"></span>
  </section>

  <section class="captures">
    <ol id="capture-list" class="capture-list"></ol>
    <p id="empty-state" class="empty-state">No captures yet. Open a claude.ai conversation; new API responses will appear here.</p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
